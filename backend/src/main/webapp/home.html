<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusMarket - Home</title>
    <style>
        :root {
            --primary: #001524;
            --secondary: #4b644f;
            --surface: #fff8f5;
            --primary-soft: rgba(0, 21, 36, 0.08);
            --primary-mid: rgba(0, 21, 36, 0.16);
            --secondary-soft: rgba(75, 100, 79, 0.12);
            --secondary-mid: rgba(75, 100, 79, 0.22);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: var(--surface); color: var(--primary); padding: 24px; }
        .container { max-width: 1240px; margin: 0 auto; }

        .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; gap: 20px; flex-wrap: wrap; }
        .logo { font-size: 28px; font-weight: 700; text-decoration: none; color: var(--primary); }
        .nav-links { display: flex; align-items: center; gap: 26px; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: var(--primary); font-size: 15px; padding-bottom: 4px; }
        .nav-links a.active { border-bottom: 2px solid var(--primary); font-weight: 700; }
        .sell-btn { background: var(--primary); color: var(--surface); border: none; border-radius: 999px; padding: 12px 22px; font-size: 14px; cursor: pointer; text-decoration: none; }

        .hero { text-align: center; margin-bottom: 38px; }
        .hero h1 { font-size: 62px; margin-bottom: 14px; }
        .hero p { max-width: 760px; margin: 0 auto 26px; font-size: 17px; color: var(--secondary); }

        /* Search bar */
        .search-row { display: flex; justify-content: center; margin-bottom: 28px; }
        .search-row input { width: 100%; max-width: 520px; padding: 14px 22px; border: 1px solid var(--primary-mid); border-radius: 999px 0 0 999px; font-size: 15px; outline: none; background: white; }
        .search-row button { padding: 14px 24px; background: var(--primary); color: white; border: none; border-radius: 0 999px 999px 0; font-size: 14px; cursor: pointer; }

        .chips { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 42px; }
        .chip { padding: 10px 18px; border-radius: 999px; background: var(--secondary-soft); color: var(--secondary); cursor: pointer; border: none; font-size: 14px; }
        .chip.active { background: var(--secondary); color: var(--surface); }

        /* Dynamic product grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; margin-bottom: 56px; }

        .card { background: var(--surface); border-radius: 26px; padding: 16px; border: 1px solid var(--primary-soft); }
        .card-image { width: 100%; height: 220px; border-radius: 18px; overflow: hidden; margin-bottom: 16px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .card-image .no-img { font-size: 48px; }

        .title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
        .title-row h3 { font-size: 15px; flex: 1; }
        .price { font-weight: bold; font-size: 15px; white-space: nowrap; }
        .meta { margin-bottom: 12px; }
        .meta span { font-size: 11px; padding: 5px 10px; border-radius: 999px; background: var(--secondary-soft); color: var(--secondary); margin-right: 6px; display: inline-block; margin-bottom: 4px; }
        .seller-info { font-size: 12px; color: #777; margin-bottom: 12px; }

        .primary-btn { display: block; text-align: center; background: var(--primary); color: white; padding: 12px; border-radius: 999px; text-decoration: none; font-size: 14px; }

        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state h3 { font-size: 22px; margin-bottom: 10px; }

        .loading-state { text-align: center; padding: 60px 20px; color: #aaa; font-style: italic; }

        .alert { padding: 10px 14px; border-radius: 12px; font-size: 13px; margin-bottom: 20px; text-align: center; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .alert-error { background: #fde8e8; color: #b91c1c; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="container">

        <header class="navbar">
            <a class="logo" href="home.html">CampusMarket</a>
            <nav class="nav-links">
                <a class="active" href="home.html">Home</a>
                <a href="post-item.html">Post Item</a>
                <a href="profile.html">Profile</a>
                <a href="signin.html">Sign In</a>
            </nav>
        </header>

        <section class="hero">
            <h1>The Curated Campus</h1>
            <p>Discover campus-ready items from fellow students.</p>

            <!-- Search bar → BrowseServlet?search=... -->
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Search items…">
                <button onclick="doSearch()">Search</button>
            </div>

            <!-- Category filter chips -->
            <div class="chips" id="chipBar">
                <button class="chip active" data-category="">All Items</button>
                <button class="chip" data-category="Textbooks">Textbooks</button>
                <button class="chip" data-category="Electronics">Electronics</button>
                <button class="chip" data-category="Home &amp; Dorm">Home &amp; Dorm</button>
                <button class="chip" data-category="Fashion">Fashion</button>
            </div>
        </section>

        <div id="alertBox"></div>

        <!-- Items loaded dynamically from BrowseServlet -->
        <section class="product-grid" id="productGrid">
            <div class="loading-state" style="grid-column:1/-1">Loading items…</div>
        </section>

    </div>

    <script>
        var currentCategory = "";
        var currentSearch   = "";

        // Show success/error from URL params (e.g. after posting an item)
        (function () {
            var params = new URLSearchParams(window.location.search);
            var box = document.getElementById("alertBox");
            if (params.get("success") === "posted") {
                box.innerHTML = '<div class="alert alert-success">Your item was posted successfully!</div>';
            }
            if (params.get("error") === "database") {
                box.innerHTML = '<div class="alert alert-error">A database error occurred. Please try again.</div>';
            }
        })();

        // Category chip clicks
        document.getElementById("chipBar").addEventListener("click", function (e) {
            var chip = e.target.closest(".chip");
            if (!chip) return;
            document.querySelectorAll(".chip").forEach(function (c) { c.classList.remove("active"); });
            chip.classList.add("active");
            currentCategory = chip.dataset.category;
            loadItems();
        });

        // Search button / Enter key
        function doSearch() {
            currentSearch = document.getElementById("searchInput").value.trim();
            loadItems();
        }
        document.getElementById("searchInput").addEventListener("keydown", function (e) {
            if (e.key === "Enter") doSearch();
        });

        // Fetch items from BrowseServlet as JSON
        function loadItems() {
            var grid = document.getElementById("productGrid");
            grid.innerHTML = '<div class="loading-state" style="grid-column:1/-1">Loading items…</div>';

            var url = "BrowseServlet?format=json";
            if (currentCategory) url += "&category=" + encodeURIComponent(currentCategory);
            if (currentSearch)   url += "&search="   + encodeURIComponent(currentSearch);

            fetch(url)
                .then(function (r) { return r.json(); })
                .then(function (items) { renderItems(items); })
                .catch(function () {
                    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>Could not load items</h3><p>Make sure the server is running.</p></div>';
                });
        }

        function renderItems(items) {
            var grid = document.getElementById("productGrid");
            if (!items || items.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">' +
                    '<h3>No items found</h3>' +
                    '<p>Be the first to <a href="post-item.html">post an item</a>!</p>' +
                    '</div>';
                return;
            }

            grid.innerHTML = items.map(function (item) {
                var imgHtml = item.imagePath
                    ? '<img src="' + item.imagePath + '" alt="' + esc(item.title) + '" onerror="this.parentElement.innerHTML=\'<span class=no-img>📦</span>\'">'
                    : '<span class="no-img">📦</span>';

                return '<article class="card">' +
                    '<div class="card-image">' + imgHtml + '</div>' +
                    '<div class="title-row"><h3>' + esc(item.title) + '</h3>' +
                    '<div class="price">₹' + parseFloat(item.price).toLocaleString("en-IN") + '</div></div>' +
                    '<div class="meta">' +
                    '<span>' + esc(item.category) + '</span>' +
                    '<span>' + esc(item.conditionType) + '</span>' +
                    '</div>' +
                    '<div class="seller-info">By ' + esc(item.sellerName) +
                    (item.hostelBlock ? ' · ' + esc(item.hostelBlock) : '') + '</div>' +
                    '<a class="primary-btn" href="item-details.html?id=' + item.itemId + '">View Details</a>' +
                    '</article>';
            }).join("");
        }

        function esc(s) {
            if (!s) return "";
            return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        // Load on page start
        loadItems();
    </script>
</body>
</html>
