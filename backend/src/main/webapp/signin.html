<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>CampusMarket - Sign In</title>
    <style>
        :root {
            --primary: #091b2d;
            --secondary: #6b7c6f;
            --bg: #f8f3ee;
            --card: #fff8f2;
            --tab-bg: #f3e9df;
            --border: #e6d8cd;
            --text: #222222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 430px; }
        .brand { text-align: center; margin-bottom: 25px; }
        .brand h1 { font-size: 34px; color: var(--primary); margin-bottom: 8px; }
        .brand p { color: #6d6d6d; font-size: 15px; }
        .card { background: var(--card); padding: 28px; border-radius: 22px; box-shadow: 0 6px 18px rgba(0,0,0,0.06); border: 1px solid #f0e2d8; }
        .tabs { display: flex; gap: 6px; margin-bottom: 22px; background: var(--tab-bg); padding: 4px; border-radius: 50px; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 50px; font-size: 15px; font-weight: bold; cursor: pointer; color: var(--primary); }
        .tab.active { background: var(--primary); color: white; }
        .form { display: none; }
        .form.active { display: block; }
        label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #6d7c70; letter-spacing: 1px; }
        input, select { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 14px; font-size: 14px; background: white; color: var(--text); }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 50px; background: var(--primary); color: white; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 6px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .small-text { text-align: center; margin-top: 16px; font-size: 13px; color: #777777; }
        .alert { padding: 10px 14px; border-radius: 12px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .alert-error { background: #fde8e8; color: #b91c1c; border: 1px solid #fca5a5; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    </style>
</head>
<body>
    <div class="container">
        <div style="padding: 30px 0; display: flex; justify-content: center; gap: 30px; margin-bottom: 20px;">
            <a href="home.html" style="text-decoration:none;color:var(--primary);font-size:15px;">Home</a>
            <a href="post-item.html" style="text-decoration:none;color:var(--primary);font-size:15px;">Post Item</a>
            <a href="item-details.html" style="text-decoration:none;color:var(--primary);font-size:15px;">Item Details</a>
        </div>

        <div class="brand">
            <h1>CampusMarket</h1>
            <p>Your campus marketplace</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('in')">Login</button>
                <button class="tab" onclick="showTab('up')">Create Account</button>
            </div>

            <!-- Error / success banner -->
            <div id="alertBox"></div>

            <!--
                LOGIN FORM
                Sends: email, password  →  LoginServlet
            -->
            <form class="form active" id="signinForm" action="LoginServlet" method="post">
                <label>Email</label>
                <input type="email" name="email" placeholder="yourname@silicon.ac.in" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>

                <button type="submit" class="btn">Login</button>
            </form>

            <!--
                REGISTER FORM
                Sends: full_name, email, password, phone, hostel_block, year_of_study, branch
                → RegisterServlet (matches all parameters exactly)
            -->
            <form class="form" id="signupForm" action="RegisterServlet" method="post">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter your full name" required>

                <label>Email (@silicon.ac.in only)</label>
                <input type="email" name="email" placeholder="yourname@silicon.ac.in" required>

                <label>Phone</label>
                <input type="tel" name="phone" placeholder="e.g. 9876543210" required>

                <div class="grid">
                    <div>
                        <label>Branch</label>
                        <select name="branch" required>
                            <option value="">Select</option>
                            <option value="CSE">CSE</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="ME">ME</option>
                            <option value="CE">CE</option>
                        </select>
                    </div>
                    <div>
                        <label>Year</label>
                        <select name="year_of_study" required>
                            <option value="">Select</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                </div>

                <label>Hostel Block</label>
                <select name="hostel_block" required>
                    <option value="">Select</option>
                    <option value="Hostel A">Hostel A</option>
                    <option value="Hostel B">Hostel B</option>
                    <option value="Hostel C">Hostel C</option>
                    <option value="Nilgiri">Nilgiri</option>
                    <option value="Satpuda">Satpuda</option>
                    <option value="Localite">Localite (Day Scholar)</option>
                </select>

                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>

                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="small-text">Buy, sell and connect inside your campus</div>
        </div>
    </div>

    <script>
        // Show error/success messages from URL query params
        (function () {
            var params = new URLSearchParams(window.location.search);
            var error = params.get("error");
            var box = document.getElementById("alertBox");
            var messages = {
                invalid_email : "Only @silicon.ac.in email addresses are allowed.",
                email_exists  : "This email is already registered. Please log in.",
                failed        : "Registration failed. Please try again.",
                database      : "Database error. Please try again later.",
                invalid       : "Incorrect email or password."
            };
            if (error && messages[error]) {
                box.innerHTML = '<div class="alert alert-error">' + messages[error] + '</div>';
                showTab(error === "invalid" ? "in" : "up");
            }
            if (params.get("success") === "registered") {
                box.innerHTML = '<div class="alert alert-success">Account created! Please log in.</div>';
            }
        })();

        function showTab(tabName) {
            document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
            document.querySelectorAll(".form").forEach(function(f){ f.classList.remove("active"); });
            if (tabName === "in") {
                document.querySelectorAll(".tab")[0].classList.add("active");
                document.getElementById("signinForm").classList.add("active");
            } else {
                document.querySelectorAll(".tab")[1].classList.add("active");
                document.getElementById("signupForm").classList.add("active");
            }
        }
    </script>
</body>
</html>
