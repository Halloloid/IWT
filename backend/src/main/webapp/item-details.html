<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMarket - Item Details</title>
    <style>
        body { margin: 0; background-color: #f8f3ee; font-family: Arial, Helvetica, sans-serif; color: #222222; }
        .page { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 25px 0; }
        .logo { font-size: 28px; font-weight: bold; text-decoration: none; color: #222; }
        .menu { display: flex; gap: 30px; }
        .menu a { text-decoration: none; color: #333333; font-size: 16px; }

        .back-link { font-size: 14px; color: #666; margin-bottom: 18px; display: inline-block; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }

        .main-section { display: grid; grid-template-columns: 2fr 1fr; gap: 35px; }
        .left-part { width: 100%; }

        .big-image { background: #e8e0d8; border-radius: 20px; overflow: hidden; margin-bottom: 0; }
        .big-image img { width: 100%; height: 430px; object-fit: cover; border-radius: 20px; display: block; }
        .big-image .no-img { height: 430px; display: flex; align-items: center; justify-content: center; font-size: 80px; }

        .small-images { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
        .small-images img { width: 100%; height: 170px; object-fit: cover; border-radius: 18px; display: block; }

        .right-part { width: 100%; }
        .category-line { font-size: 12px; color: #777777; margin-bottom: 12px; }
        .label { display: inline-block; background-color: #f2dd72; color: #5b4d00; font-size: 10px; font-weight: bold; padding: 6px 10px; border-radius: 20px; margin-right: 10px; }
        .product-title { font-size: 46px; line-height: 1.1; margin: 10px 0; color: #13243a; }
        .price { font-size: 34px; font-weight: bold; margin-bottom: 25px; }

        .seller-box { background-color: #fff8f2; border: 1px solid #eee0d6; border-radius: 18px; padding: 15px; margin-bottom: 24px; }
        .seller-row { display: flex; justify-content: space-between; align-items: center; }
        .seller-left { display: flex; align-items: center; gap: 12px; }
        .seller-circle { width: 42px; height: 42px; border-radius: 50%; background-color: #dce9cd; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #4d6d4d; font-size: 14px; }
        .seller-name { font-size: 14px; font-weight: bold; }
        .seller-info { font-size: 12px; color: #777777; margin-top: 3px; }
        .verified { width: 18px; height: 18px; border-radius: 50%; background-color: #5e8c69; }

        .section-title { font-size: 12px; color: #888888; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px; }
        .description { font-size: 14px; color: #555555; line-height: 1.7; margin-bottom: 24px; }

        .pickup-box { background-color: #ffffff; border: 1px solid #eee0d6; border-radius: 18px; padding: 16px; margin-bottom: 20px; }
        .pickup-row { display: flex; align-items: flex-start; gap: 12px; }
        .location-icon { width: 34px; height: 34px; border-radius: 50%; background-color: #222221; display: flex; justify-content: center; align-items: center; font-size: 16px; }
        .pickup-main { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        .pickup-sub { font-size: 12px; color: #777777; }

        .buy-btn { width: 100%; padding: 18px; border: none; border-radius: 30px; background-color: #091b2d; color: white; font-size: 16px; font-weight: bold; margin-bottom: 14px; cursor: pointer; }
        .message-btn { width: 100%; padding: 17px; border-radius: 30px; border: 1px solid #e4d7cd; background-color: transparent; font-size: 16px; cursor: pointer; }

        .similar-section { margin-top: 55px; }
        .similar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .similar-top h2 { margin: 0; font-size: 34px; color: #1c2432; }
        .similar-top a { text-decoration: none; color: #666666; font-size: 14px; }
        .similar-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 22px; }

        .item-card { cursor: pointer; }
        .item-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 18px; display: block; }
        .item-card .no-img-sm { height: 220px; background: #e8e0d8; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .item-info { display: flex; justify-content: space-between; margin-top: 12px; font-size: 15px; font-weight: bold; }
        .item-place { font-size: 13px; color: #888888; margin-top: 5px; }

        .loading { color: #aaa; font-style: italic; padding: 40px 0; text-align: center; }
        .error-state { padding: 40px 0; text-align: center; color: #888; }

        @media (max-width: 800px) {
            .main-section { grid-template-columns: 1fr; }
            .page { padding: 16px; }
            .product-title { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="page">

        <div class="topbar">
            <a href="home.html" class="logo">CampusMarket</a>
            <div class="menu">
                <a href="home.html">Home</a>
                <a href="post-item.html">Post Item</a>
                <a href="profile.html">Profile</a>
                <a href="signin.html">Sign In</a>
            </div>
        </div>

        <a class="back-link" href="home.html">← Back to listings</a>

        <!-- Main content populated by JS -->
        <div id="mainContent">
            <div class="loading">Loading item details…</div>
        </div>

        <!-- Similar items section -->
        <div class="similar-section" id="similarSection" style="display:none">
            <div class="similar-top">
                <h2 id="similarTitle">Similar Items</h2>
                <a href="home.html">View all</a>
            </div>
            <div class="similar-list" id="similarList"></div>
        </div>

    </div>

    <script>
        var itemId = new URLSearchParams(window.location.search).get("id");

        if (!itemId) {
            document.getElementById("mainContent").innerHTML =
                '<div class="error-state"><h3>No item selected.</h3><p><a href="home.html">Browse all items</a></p></div>';
        } else {
            // Fetch item detail from ItemDetailServlet?id=...
            fetch("ItemDetailServlet?id=" + encodeURIComponent(itemId))
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.error) {
                        document.getElementById("mainContent").innerHTML =
                            '<div class="error-state"><h3>Item not found.</h3><p><a href="home.html">Browse all items</a></p></div>';
                        return;
                    }
                    renderItem(data);
                    loadSimilar(data.category, data.itemId);
                })
                .catch(function () {
                    document.getElementById("mainContent").innerHTML =
                        '<div class="error-state"><h3>Could not load item.</h3><p>Make sure the server is running.</p></div>';
                });
        }

        function renderItem(d) {
            var initials = d.sellerName ? d.sellerName.split(" ").map(function(w){ return w[0]; }).join("").substring(0,2).toUpperCase() : "??";
            var imgHtml = d.imagePath
                ? '<img src="' + esc(d.imagePath) + '" alt="' + esc(d.title) + '" onerror="this.parentElement.innerHTML=\'<div class=no-img>📦</div>\'">'
                : '<div class="no-img" style="height:430px;display:flex;align-items:center;justify-content:center;font-size:80px;">📦</div>';

            document.getElementById("mainContent").innerHTML =
                '<div class="main-section">' +
                  '<div class="left-part">' +
                    '<div class="big-image">' + imgHtml + '</div>' +
                  '</div>' +
                  '<div class="right-part">' +
                    '<div class="category-line">' +
                      '<span class="label">' + esc(d.conditionType ? d.conditionType.toUpperCase() : "USED") + '</span>' +
                      esc(d.category) +
                    '</div>' +
                    '<h1 class="product-title">' + esc(d.title) + '</h1>' +
                    '<div class="price">₹ ' + parseFloat(d.price).toLocaleString("en-IN") + '</div>' +
                    '<div class="seller-box">' +
                      '<div class="seller-row">' +
                        '<div class="seller-left">' +
                          '<div class="seller-circle">' + initials + '</div>' +
                          '<div>' +
                            '<div class="seller-name">' + esc(d.sellerName) + '</div>' +
                            '<div class="seller-info">Verified Student</div>' +
                          '</div>' +
                        '</div>' +
                        '<div class="verified"></div>' +
                      '</div>' +
                    '</div>' +
                    '<div class="section-title">DESCRIPTION</div>' +
                    '<div class="description">' + esc(d.description || "No description provided.") + '</div>' +
                    '<div class="section-title">PICKUP DETAILS</div>' +
                    '<div class="pickup-box">' +
                      '<div class="pickup-row">' +
                        '<div class="location-icon">📍</div>' +
                        '<div>' +
                          '<div class="pickup-main">' + esc(d.hostelBlock || "On Campus") + '</div>' +
                          '<div class="pickup-sub">Contact seller to arrange pickup</div>' +
                        '</div>' +
                      '</div>' +
                    '</div>' +
                    '<button class="buy-btn" onclick="alert(\'Contact: ' + esc(d.sellerEmail) + '\')">Contact Seller →</button>' +
                    '<button class="message-btn" onclick="alert(\'Email: ' + esc(d.sellerEmail) + '\')">Message Seller</button>' +
                  '</div>' +
                '</div>';
        }

        function loadSimilar(category, excludeId) {
            if (!category) return;
            fetch("BrowseServlet?format=json&category=" + encodeURIComponent(category))
                .then(function (r) { return r.json(); })
                .then(function (items) {
                    var filtered = items.filter(function (i) { return i.itemId != excludeId; }).slice(0, 3);
                    if (filtered.length === 0) return;
                    document.getElementById("similarTitle").textContent = "Similar in " + category;
                    document.getElementById("similarList").innerHTML = filtered.map(function (item) {
                        var imgHtml = item.imagePath
                            ? '<img src="' + esc(item.imagePath) + '" alt="' + esc(item.title) + '" onerror="this.parentElement.innerHTML=\'<div class=no-img-sm>📦</div>\'">'
                            : '<div class="no-img-sm">📦</div>';
                        return '<div class="item-card" onclick="window.location.href=\'item-details.html?id=' + item.itemId + '\'">' +
                            imgHtml +
                            '<div class="item-info"><div>' + esc(item.title) + '</div><div>₹' + parseFloat(item.price).toLocaleString("en-IN") + '</div></div>' +
                            '<div class="item-place">' + esc(item.hostelBlock || "On campus") + '</div>' +
                            '</div>';
                    }).join("");
                    document.getElementById("similarSection").style.display = "block";
                })
                .catch(function(){});
        }

        function esc(s) {
            if (!s) return "";
            return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }
    </script>
</body>
</html>
