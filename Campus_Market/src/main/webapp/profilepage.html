<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMarket Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-[#fffaf0] text-gray-800">

    <header class="bg-white border-b">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <h1 class="text-2xl font-bold heading-font">CampusMarket</h1>
                <nav class="flex gap-6 text-sm font-medium">
                    <a href="homepage.html" class="hover:text-black">Home</a>
                    <a href="createproduct.html" class="hover:text-black">Sell</a>
                    <a href="profilepage.html" class="hover:text-black">Profile</a>
                </nav>
            </div>
            
            <div class="flex items-center gap-5">
                <a href="LogoutServlet" class="text-sm font-medium hover:text-black">Logout</a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row justify-between items-start gap-6">
            <div>
                <h1 class="text-5xl font-bold heading-font" id="fullName">Loading profile...</h1>
                <p class="text-lg text-gray-600 mt-1" id="academicInfo">Please wait</p>
                <span class="inline-block bg-emerald-700 text-white text-xs font-medium px-4 py-1 rounded-3xl mt-3" id="yearBadge">
                    STUDENT
                </span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
            <div>
                <p class="text-xs uppercase tracking-widest text-gray-500 mb-2">Contact Details</p>
                <p class="flex items-center gap-2 text-gray-700" id="contactInfo">
                    <i class="fa-solid fa-phone"></i>
                    Loading...
                </p>
                <p class="flex items-center gap-2 text-gray-700 mt-2" id="emailInfo">
                    <i class="fa-solid fa-envelope"></i>
                    Loading...
                </p>
            </div>
            <div>
                <p class="text-xs uppercase tracking-widest text-gray-500 mb-2">Campus Address</p>
                <p class="flex items-center gap-2 text-gray-700" id="addressInfo">
                    <i class="fa-solid fa-location-dot"></i>
                    Loading...
                </p>
            </div>
        </div>

        <div class="flex gap-4 mt-10">
            <div class="bg-white rounded-3xl px-8 py-5 shadow-sm">
                <p class="text-4xl font-semibold" id="itemCount">0</p>
                <p class="text-sm text-gray-500">ACTIVE LISTINGS</p>
            </div>
            <div class="bg-white rounded-3xl px-8 py-5 shadow-sm">
                <p class="text-4xl font-semibold" id="availableCount">0</p>
                <p class="text-sm text-gray-500">AVAILABLE ITEMS</p>
            </div>
        </div>

        <div class="mt-10 flex gap-2">
            <button onclick="toggleMode(this)" 
                    class="seller-btn active bg-black text-white px-8 py-3 rounded-3xl font-medium">
                Seller Mode
            </button>
            <button onclick="toggleMode(this)" 
                    class="buyer-btn px-8 py-3 rounded-3xl font-medium bg-white">
                Buyer Mode
            </button>
        </div>

        <div class="mt-12">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold">My Listings</h2>
                <button onclick="window.location.href='createproduct.html'"
                        class="bg-emerald-800 text-white px-6 py-3 rounded-3xl flex items-center gap-2 hover:bg-emerald-900">
                    <i class="fa-solid fa-plus"></i>
                    List New Item
                </button>
            </div>

            <div id="listingGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <div class="bg-white rounded-3xl p-8 text-center text-gray-500">
                    Loading listings...
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMode(btn) {
            document.querySelectorAll('.seller-btn, .buyer-btn').forEach(b => {
                b.classList.remove('active', 'bg-black', 'text-white');
                b.classList.add('bg-white');
            });
            
            btn.classList.add('active', 'bg-black', 'text-white');
        }

        const fullName = document.querySelector("#fullName");
        const academicInfo = document.querySelector("#academicInfo");
        const yearBadge = document.querySelector("#yearBadge");
        const contactInfo = document.querySelector("#contactInfo");
        const emailInfo = document.querySelector("#emailInfo");
        const addressInfo = document.querySelector("#addressInfo");
        const itemCount = document.querySelector("#itemCount");
        const availableCount = document.querySelector("#availableCount");
        const listingGrid = document.querySelector("#listingGrid");

        const loadProfile = async () => {
            try {
                let response = await fetch("ProfileServlet", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }

                const resp = await response.json();

                if (resp.error) {
                    fullName.textContent = "Profile unavailable";
                    academicInfo.textContent = resp.error;
                    listingGrid.innerHTML = "";
                    return;
                }

                fullName.textContent = resp.fullName;
                academicInfo.textContent = (resp.branch ? resp.branch : "Branch not set") + " | Year " + resp.yearOfStudy;
                yearBadge.textContent = resp.yearOfStudy ? "YEAR " + resp.yearOfStudy : "STUDENT";
                contactInfo.innerHTML = `<i class="fa-solid fa-phone"></i> ${resp.phone ? resp.phone : 'Phone not available'}`;
                emailInfo.innerHTML = `<i class="fa-solid fa-envelope"></i> ${resp.email}`;
                addressInfo.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${resp.hostelBlock ? resp.hostelBlock : 'Hostel details unavailable'}`;
                itemCount.textContent = resp.itemCount;
                availableCount.textContent = resp.items.filter(item => item.status === "available").length;

                renderListings(resp.items);
            } catch (error) {
                fullName.textContent = "Profile unavailable";
                academicInfo.textContent = "Could not reach the server.";
                listingGrid.innerHTML = `
                    <div class="bg-white rounded-3xl p-8 text-center text-gray-500 md:col-span-2 xl:col-span-3">
                        Could not load listings.
                    </div>
                `;
            }
        };

        function renderListings(items) {
            if (!items || items.length === 0) {
                listingGrid.innerHTML = `
                    <div class="bg-white rounded-3xl p-8 text-center text-gray-500 md:col-span-2 xl:col-span-3">
                        No listings yet.
                    </div>
                `;
                return;
            }

            let cards = "";

            items.forEach(item => {
                const image = item.imagePath ? item.imagePath : "https://picsum.photos/id/201/600/400";
                cards += `
                    <div class="bg-white rounded-3xl overflow-hidden card-hover">
                        <img src="${image}" class="w-full h-64 object-cover" alt="${item.title}">
                        <div class="p-6">
                            <div class="flex items-start justify-between gap-4">
                                <div>
                                    <h3 class="text-xl font-semibold">${item.title}</h3>
                                    <p class="text-gray-500 mt-1">${item.category}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-bold text-emerald-700">Rs. ${item.price}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 mt-4 text-sm">
                                <span class="inline-block bg-gray-100 text-gray-700 px-3 py-1 rounded-3xl">${item.conditionType}</span>
                                <span class="inline-block bg-emerald-100 text-emerald-700 px-3 py-1 rounded-3xl">${item.status}</span>
                            </div>
                            <button onclick="window.location.href='productdetail.html?id=${item.itemId}'"
                                    class="w-full mt-6 bg-black text-white py-3 rounded-3xl font-medium">
                                View Listing
                            </button>
                        </div>
                    </div>
                `;
            });

            listingGrid.innerHTML = cards;
        }

        window.onload = function() {
            loadProfile();
        };
    </script>
</body>
</html>
