        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

    </div>

    <script>
        let products = [];
        let selectedCategory = "all";

        function renderProducts(filteredProducts) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-white border border-gray-200 rounded-3xl p-10 text-center">
                        <h3 class="text-xl font-semibold text-gray-900 mb-2">No items found</h3>
                        <p class="text-gray-600">Try a different search or category.</p>
                    </div>
                `;
                return;
            }

            filteredProducts.forEach(product => {
                const cardHTML = `
                    <div class="product-card bg-white rounded-3xl overflow-hidden border border-gray-100">
                        <div class="relative">
                            <img src="${product.imagePath ? product.imagePath : 'https://picsum.photos/id/201/600/400'}" 
                                 class="w-full h-56 object-cover">
                        </div>
                        
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-semibold text-lg leading-tight">${product.title}</h3>
                                <p class="text-2xl font-semibold text-emerald-700">Rs. ${product.price}</p>
                            </div>
                            
                            <div class="flex items-center gap-2 text-xs mb-4">
                                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-3xl">${product.conditionType}</span>
                                <span class="text-gray-500">${product.sellerName}</span>
                            </div>
                            
                            <button onclick="viewDetails(${product.itemId})"
                                    class="w-full bg-black text-white py-4 rounded-2xl text-sm font-semibold hover:bg-gray-800 transition">
                                View Details
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function filterByCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-gray-900', 'text-white');
                btn.classList.add('bg-white', 'hover:bg-gray-100');
            });
            
            if (category === 'all') {
                document.getElementById('cat-all').classList.add('active', 'bg-gray-900', 'text-white');
            } else {
                document.getElementById(`cat-${category}`).classList.add('active', 'bg-gray-900', 'text-white');
            }

            selectedCategory = category;
            loadProducts();
        }

        const loadProducts = async () => {
            const params = new URLSearchParams({
                format: "json"
            });

            if (selectedCategory !== "all") {
                params.append("category", selectedCategory);
            }

            let url = "BrowseServlet?" + params.toString();

            try {
                let response = await fetch(url, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                const resp = await response.json();
                products = resp;
                renderProducts(products);
            } catch (error) {
                renderProducts([]);
            }
        };

        function viewDetails(id) {
            window.location.href = "productdetail.html?id=" + id;
        }

        window.onload = function() {
            loadProducts();
        };
    </script>
