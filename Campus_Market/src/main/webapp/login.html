<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>CampusMarket - Sign In</title>

    <style>
        :root {
            --primary: #091b2d;
            --secondary: #6b7c6f;
            --bg: #f8f3ee;
            --card: #fff8f2;
            --tab-bg: #f3e9df;
            --border: #e6d8cd;
            --text: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 430px;
        }

        .brand {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand h1 {
            font-size: 34px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .brand p {
            color: #6d6d6d;
            font-size: 15px;
        }

        .card {
            background: var(--card);
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            border: 1px solid #f0e2d8;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 22px;
            background: var(--tab-bg);
            padding: 4px;
            border-radius: 50px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            color: var(--primary);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: #6d7c70;
            letter-spacing: 1px;
        }

        input,
        select {
            width: 100%;
            padding: 13px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            background: white;
            color: var(--text);
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Styles for invalid email (HTML5 validation) */
        input:invalid:focus {
            border-color: #e74c3c;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .small-text {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #777777;
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="brand">
            <h1>CampusMarket</h1>
            <p>Your campus marketplace</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button type="button" class="tab active" onclick="showTab('in')">Login</button>
                <button type="button" class="tab" onclick="showTab('up')">Create Account</button>
            </div>

            <!-- Login Form -->
            <form class="form active" id="signinForm">
                <label>Email</label>
                <input type="email" name="email" placeholder="user@silicon.ac.in" 
                       pattern=".+@silicon\.ac\.in" 
                       title="Please use your institutional email ending in @silicon.ac.in" 
                       required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>

                <button type="submit" class="btn">Login</button>
            </form>

            <!-- Create Account Form -->
            <form class="form" id="signupForm">
                <label>SIC</label>
                <input type="text" name="sic" placeholder="Enter your 7-digit SIC" maxlength="7" required>

                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter your full name" required>

                <label>Email</label>
                <input type="email" name="email" placeholder="user@silicon.ac.in" 
                       pattern=".+@silicon\.ac\.in" 
                       title="Please use your institutional email ending in @silicon.ac.in" 
                       required>

                <label>Phone</label>
                <input type="text" name="phone" placeholder="Enter your phone number" required>

                <div class="grid">
                    <div>
                        <label>Branch</label>
                        <select name="branch">
                            <option value="">Select</option>
                            <option value="CSE">CSE</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="ME">ME</option>
                            <option value="CE">CE</option>
                        </select>
                    </div>

                    <div>
                        <label>Year</label>
                        <select name="year_of_study">
                            <option value="">Select</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                </div>

                <label>Hostel Block</label>
                <input type="text" name="hostel_block" placeholder="Enter hostel block">

                <label>Password</label>
                <input type="password" name="password" placeholder="Create password" required>

                <button type="submit" class="btn">Create Account</button>
            </form>
            <div class="small-text">
                Buy, sell and connect inside your campus
            </div>
        </div>
    </div>

    <script>
        const signInForm = document.querySelector("#signinForm");
        const signUpForm = document.querySelector("#signupForm");

        function showTab(tabName) {
            var tabs = document.querySelectorAll(".tab");
            var forms = document.querySelectorAll(".form");

            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            for (var j = 0; j < forms.length; j++) {
                forms[j].classList.remove("active");
            }

            if (tabName === "in") {
                tabs[0].classList.add("active");
                document.getElementById("signinForm").classList.add("active");
            } else {
                tabs[1].classList.add("active");
                document.getElementById("signupForm").classList.add("active");
            }
        }

        signInForm.addEventListener("submit", async function(e) {
            e.preventDefault();

            const email = this.querySelector('input[name="email"]').value.trim();
            const password = this.querySelector('input[name="password"]').value;

            if (!email.endsWith("@silicon.ac.in")) {
                alert("Please use your @silicon.ac.in email address.");
                return;
            }

            const params = {
                email: email,
                password: password
            };

            try {
                let response = await fetch("LoginServlet", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(params)
                });

                window.location.href = response.url;
            } catch (error) {
                alert("Could not reach the server. Please try again.");
            }
        });

        signUpForm.addEventListener("submit", async function(e) {
            e.preventDefault();

            const sic = this.querySelector('input[name="sic"]').value.trim();
            const fullName = this.querySelector('input[name="full_name"]').value.trim();
            const email = this.querySelector('input[name="email"]').value.trim();
            const phone = this.querySelector('input[name="phone"]').value.trim();
            const branch = this.querySelector('select[name="branch"]').value;
            const yearOfStudy = this.querySelector('select[name="year_of_study"]').value;
            const hostelBlock = this.querySelector('input[name="hostel_block"]').value.trim();
            const password = this.querySelector('input[name="password"]').value;

            if (!email.endsWith("@silicon.ac.in")) {
                alert("Please use your @silicon.ac.in email address.");
                return;
            }

            if (sic.length !== 7) {
                alert("SIC must be exactly 7 characters.");
                return;
            }

            const params = {
                sic: sic,
                full_name: fullName,
                email: email,
                phone: phone,
                branch: branch,
                year_of_study: yearOfStudy,
                hostel_block: hostelBlock,
                password: password
            };

            try {
                let response = await fetch("RegisterServlet", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(params)
                });

                window.location.href = response.url;
            } catch (error) {
                alert("Could not reach the server. Please try again.");
            }
        });
    </script>
</body>
</html>
