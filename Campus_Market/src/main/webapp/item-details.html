<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMarket</title>

    <style>
        body {
            margin: 0;
            background-color: #f9fafb;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #222222;
        }

        /* Dark navbar */
        .site-nav {
            background: #111827;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .site-nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }

        .logo-text {
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text span {
            color: #10b981;
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .back-text {
            font-size: 14px;
            color: #666666;
            margin-bottom: 18px;
        }

        .back-text a {
            text-decoration: none;
            color: inherit;
            transition: color 0.2s;
        }

        .back-text a:hover {
            color: #111827;
        }

        .main-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 35px;
        }

        .left-part {
            width: 100%;
        }

        .big-image img {
            width: 100%;
            height: 430px;
            object-fit: cover;
            border-radius: 20px;
            display: block;
        }

        .small-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 18px;
        }

        .small-images img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 18px;
            display: block;
        }

        .right-part {
            width: 100%;
        }

        .category-line {
            font-size: 12px;
            color: #777777;
            margin-bottom: 12px;
        }

        .label {
            display: inline-block;
            background-color: #d1fae5;
            color: #065f46;
            font-size: 10px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            margin-right: 10px;
        }

        .product-title {
            font-size: 42px;
            line-height: 1.1;
            margin: 10px 0;
            color: #111827;
            font-weight: 700;
        }

        .price {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #111827;
        }

        .seller-box {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 24px;
        }

        .seller-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .seller-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .seller-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: #d1fae5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #065f46;
        }

        .seller-name {
            font-size: 14px;
            font-weight: bold;
        }

        .seller-info {
            font-size: 12px;
            color: #777777;
            margin-top: 3px;
        }

        .verified {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #10b981;
        }

        .section-title {
            font-size: 12px;
            color: #888888;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .description {
            font-size: 14px;
            color: #555555;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .pickup-box {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .pickup-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .location-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            color: white;
        }

        .pickup-main {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .pickup-sub {
            font-size: 12px;
            color: #777777;
        }

        .buy-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background-color: #111827;
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #1f2937;
        }

        .message-btn {
            width: 100%;
            padding: 17px;
            border-radius: 30px;
            border: 1px solid #e5e7eb;
            background-color: transparent;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .message-btn:hover {
            background-color: #f3f4f6;
        }
    </style>
</head>
<body>

    <header class="site-nav">
        <div class="site-nav-inner">
            <div class="logo-text">Campus<span>Market</span></div>
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="post-item.html">Post Item</a>
                <a href="profile.html">Profile</a>
            </div>
        </div>
    </header>

    <div class="page">

        <div class="back-text">
            <a href="home.html">&larr; Back to listings</a>
        </div>

        <div class="main-section">

            <div class="left-part">
                <div class="big-image">
                    <img id="mainImage" src="https://picsum.photos/id/201/1200/800" alt="Product Image">
                </div>

                <div class="small-images">
                    <img id="thumbImage1" src="https://picsum.photos/id/201/900/600" alt="Product Image">
                    <img id="thumbImage2" src="https://picsum.photos/id/201/900/600" alt="Product Image">
                </div>
            </div>

            <div class="right-part">
                <div class="category-line">
                    <span class="label" id="conditionBadge">Condition</span>
                    <span id="categoryText">Category</span>
                </div>

                <h1 class="product-title" id="productTitle">Loading item...</h1>

                <div class="price" id="productPrice">Rs. 0</div>

                <div class="seller-box">
                    <div class="seller-row">
                        <div class="seller-left">
                            <div class="seller-circle" id="sellerInitials">NA</div>
                            <div>
                                <div class="seller-name" id="sellerName">Seller Name</div>
                                <div class="seller-info" id="sellerInfo">seller@silicon.ac.in</div>
                            </div>
                        </div>
                        <div class="verified"></div>
                    </div>
                </div>

                <div class="section-title">DESCRIPTION</div>
                <div class="description" id="productDescription">Loading description...</div>

                <div class="section-title">PICKUP DETAILS</div>
                <div class="pickup-box">
                    <div class="pickup-row">
                        <div class="location-icon">&#9679;</div>
                        <div>
                            <div class="pickup-main" id="pickupMain">Hostel details unavailable</div>
                            <div class="pickup-sub" id="pickupSub">Contact seller for exact pickup arrangement</div>
                        </div>
                    </div>
                </div>

                <button class="buy-btn" id="statusButton">ITEM STATUS</button>
                <button class="message-btn" id="messageButton">Message Seller</button>
            </div>

        </div>

    </div>

    <script>
        const mainImage = document.querySelector("#mainImage");
        const thumbImage1 = document.querySelector("#thumbImage1");
        const thumbImage2 = document.querySelector("#thumbImage2");
        const conditionBadge = document.querySelector("#conditionBadge");
        const categoryText = document.querySelector("#categoryText");
        const productTitle = document.querySelector("#productTitle");
        const productPrice = document.querySelector("#productPrice");
        const sellerInitials = document.querySelector("#sellerInitials");
        const sellerName = document.querySelector("#sellerName");
        const sellerInfo = document.querySelector("#sellerInfo");
        const productDescription = document.querySelector("#productDescription");
        const pickupMain = document.querySelector("#pickupMain");
        const pickupSub = document.querySelector("#pickupSub");
        const statusButton = document.querySelector("#statusButton");
        const messageButton = document.querySelector("#messageButton");

        const params = new URLSearchParams(window.location.search);
        const itemId = params.get("id");
        const userEmail = params.get("email");

        const loadItemDetails = async () => {
            if (!itemId) {
                productTitle.textContent = "Item not found";
                productDescription.textContent = "No item id was provided in the page URL.";
                return;
            }

            let url = "ItemDetailServlet?id=" + itemId;

            try {
                let response = await fetch(url, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                const resp = await response.json();

                if (resp.error) {
                    productTitle.textContent = "Item not found";
                    productDescription.textContent = resp.error;
                    return;
                }

                const imageSource = resp.imagePath ? resp.imagePath : "https://picsum.photos/id/201/1200/800";
                mainImage.src = imageSource;
                thumbImage1.src = imageSource;
                thumbImage2.src = imageSource;
                conditionBadge.textContent = resp.conditionType;
                categoryText.textContent = resp.category;
                productTitle.textContent = resp.title;
                productPrice.textContent = "Rs. " + resp.price;
                sellerInitials.textContent = getInitials(resp.sellerName);
                sellerName.textContent = resp.sellerName;
                sellerInfo.textContent = resp.sellerEmail + (resp.sellerPhone ? " | " + resp.sellerPhone : "");
                productDescription.textContent = resp.description;
                pickupMain.textContent = resp.hostelBlock ? resp.hostelBlock : "Hostel details unavailable";
                pickupSub.textContent = resp.status ? "Item is currently " + resp.status : "Contact seller for availability";
                statusButton.textContent = resp.status ? resp.status.toUpperCase() : "AVAILABLE";
                messageButton.textContent = resp.sellerPhone ? "Call Seller" : "Email Seller";
            } catch (error) {
                productTitle.textContent = "Unable to load item";
                productDescription.textContent = "Could not reach the server. Please try again.";
            }
        };

        function getInitials(name) {
            if (!name) {
                return "NA";
            }

            const parts = name.trim().split(" ");
            let initials = "";
            for (let i = 0; i < parts.length && i < 2; i++) {
                if (parts[i]) {
                    initials += parts[i].charAt(0).toUpperCase();
                }
            }
            return initials || "NA";
        }

        window.onload = function() {
            if (userEmail) {
                const encodedEmail = encodeURIComponent(userEmail);
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.href = link.href + (link.href.includes('?') ? '&' : '?') + 'email=' + encodedEmail;
                });
                const backLink = document.querySelector('.back-text a');
                if (backLink) {
                    backLink.href = backLink.href + (backLink.href.includes('?') ? '&' : '?') + 'email=' + encodedEmail;
                }
            }
            loadItemDetails();
        };
    </script>

</body>
</html>
